<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Glowing background gradient -->
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1e1b4b" stop-opacity="1" />
      <stop offset="100%" stop-color="#090514" stop-opacity="1" />
    </radialGradient>
    
    <!-- Neon gradients for the logo mark -->
    <linearGradient id="neon-cyan-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="100%" stop-color="#4FACFE" />
    </linearGradient>
    
    <linearGradient id="neon-purple-pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E200FF" />
      <stop offset="100%" stop-color="#FF5B7F" />
    </linearGradient>
    
    <linearGradient id="accent-gold" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FCD34D" />
      <stop offset="100%" stop-color="#F59E0B" />
    </linearGradient>

    <!-- Filters for glows -->
    <filter id="glow-heavy" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur1" />
      <feGaussianBlur stdDeviation="24" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <filter id="glow-subtle" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background base -->
  <rect width="512" height="512" rx="128" fill="url(#bg-glow)" />
  
  <!-- Subtle background grid patterns or speed line guides -->
  <g opacity="0.08" stroke="#ffffff" stroke-width="1.5">
    <circle cx="256" cy="256" r="220" fill="none" />
    <circle cx="256" cy="256" r="160" fill="none" />
    <line x1="36" y1="256" x2="476" y2="256" />
    <line x1="256" y1="36" x2="256" y2="476" />
  </g>
  
  <!-- Outer orbital speed ring -->
  <path d="M 120 256 A 136 136 0 1 1 392 256" fill="none" stroke="url(#neon-cyan-blue)" stroke-width="4" stroke-dasharray="10 15 40 20" stroke-linecap="round" opacity="0.4" />
  <path d="M 392 256 A 136 136 0 0 1 120 256" fill="none" stroke="url(#neon-purple-pink)" stroke-width="4" stroke-dasharray="30 10 5 15" stroke-linecap="round" opacity="0.4" />

  <!-- Gravity-defying dynamic "B" Burst shape -->
  <g filter="url(#glow-heavy)" transform="translate(15, 0)">
    <!-- Back spine / vertical speed bar -->
    <rect x="160" y="120" width="24" height="272" rx="12" fill="url(#neon-cyan-blue)" />

    <!-- Top loop segment of B - angled/slanted for movement -->
    <path d="M 184 120 
             C 270 120, 310 150, 310 195 
             C 310 235, 270 255, 184 255" 
          fill="none" stroke="url(#neon-cyan-blue)" stroke-width="24" stroke-linecap="round" />

    <!-- Bottom loop segment of B - wider and offset forward for speed acceleration profile -->
    <path d="M 184 255 
             C 290 255, 336 275, 336 330 
             C 336 385, 275 392, 184 392" 
          fill="none" stroke="url(#neon-purple-pink)" stroke-width="24" stroke-linecap="round" />

    <!-- Core Dynamic Energy swoosh slashing through the 'B' -->
    <path d="M 100 370 
             Q 180 320, 270 256 
             T 440 140" 
          fill="none" stroke="url(#accent-gold)" stroke-width="16" stroke-linecap="round" filter="url(#glow-subtle)" />
          
    <!-- Spark / Burst particles flying off -->
    <circle cx="410" cy="180" r="8" fill="#FFFFFF" filter="url(#glow-subtle)" />
    <circle cx="340" cy="220" r="5" fill="#FFFFFF" opacity="0.8" />
    <circle cx="130" cy="310" r="6" fill="#00F2FE" filter="url(#glow-subtle)" />
    <circle cx="210" cy="280" r="4" fill="#E200FF" opacity="0.9" />
  </g>
</svg>
